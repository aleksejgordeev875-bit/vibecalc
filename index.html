<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- PWA: Манифест и тема -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ВайбКальк">
    
    <title>КИБЕР-КАЛЬК 3000</title>
    <style>
        /* Переменные для тем */
        :root {
            --bg-gradient-start: #0a1f0a;
            --bg-gradient-end: #000000;
            --calc-bg: #0f0f0f;
            --display-bg: #1a2a1a;
            --display-text: #39ff14;
            --btn-bg: #1a2a1a;
            --btn-text: #39ff14;
            --btn-shadow: rgba(57, 255, 20, 0.2);
            --operator-bg: #1a3a1a;
            --operator-text: #8fff8f;
            --equals-bg: #39ff14;
            --equals-text: #000000;
            --clear-bg: #2a1a1a;
            --clear-text: #ff5e00;
            --back-bg: #2a2a1a;
            --back-text: #ffd700;
        }

        /* Фиолетовая ночная тема */
        body.purple-mode {
            --bg-gradient-start: #1a0a2e;
            --bg-gradient-end: #000000;
            --calc-bg: #150a20;
            --display-bg: #2a1a4a;
            --display-text: #d400ff;
            --btn-bg: #2a1a4a;
            --btn-text: #d400ff;
            --btn-shadow: rgba(212, 0, 255, 0.2);
            --operator-bg: #3a1a5a;
            --operator-text: #e08eff;
            --equals-bg: #d400ff;
            --equals-text: #ffffff;
            --clear-bg: #3a1a2a;
            --clear-text: #ff5e00;
            --back-bg: #3a3a1a;
            --back-text: #ffd700;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            transition: background 0.3s ease;
        }

        .calculator {
            background: var(--calc-bg);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 0 30px var(--btn-shadow);
            width: 350px;
            max-width: 95vw;
            border: 1px solid var(--display-text);
            transition: all 0.3s ease;
        }

        .display {
            background: var(--display-bg);
            color: var(--display-text);
            font-size: 52px;
            text-align: right;
            padding: 16px 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            min-height: 80px;
            word-wrap: break-word;
            border: 1px solid var(--display-text);
            width: 100%;
            box-sizing: border-box;
            font-weight: 700;
            text-shadow: 0 0 8px currentColor;
            letter-spacing: 2px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            background: var(--btn-bg);
            border: 1px solid var(--btn-text);
            color: var(--btn-text);
            font-size: 26px;
            font-weight: bold;
            padding: 18px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 10px var(--btn-shadow);
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px currentColor;
        }

        button:active {
            transform: scale(0.92);
            filter: brightness(1.5);
            box-shadow: 0 0 20px currentColor;
        }

        .operator {
            background: var(--operator-bg);
            color: var(--operator-text);
        }

        .equals {
            background: var(--equals-bg);
            color: var(--equals-text);
            grid-column: span 1;
            text-shadow: none;
            font-size: 32px;
        }

        .clear {
            background: var(--clear-bg);
            color: var(--clear-text);
            grid-column: span 1;
        }

        .back {
            background: var(--back-bg);
            color: var(--back-text);
            grid-column: span 1;
        }

        .zero {
            grid-column: span 2;
        }

        /* Кнопка смены темы в углу */
        .theme-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--calc-bg);
            border: 1px solid var(--display-text);
            color: var(--display-text);
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 0 10px var(--btn-shadow);
            z-index: 10;
        }
    </style>
</head>
<body>
    <!-- Кнопка смены темы (вне калькулятора для удобства) -->
    <button class="theme-toggle" id="themeToggle">🌙 НОЧЬ</button>

    <div class="calculator">
        <input type="text" class="display" id="display" value="0" readonly>
        <div class="buttons">
            <!-- Первый ряд: Очистить всё и стереть символ -->
            <button class="clear" id="clearBtn">AC</button>
            <button class="back" id="backspaceBtn">⌫</button>
            <button class="operator" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="appendOperator('/')">/</button>
            
            <!-- Второй ряд -->
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <!-- Третий ряд -->
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <!-- Четвертый ряд -->
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <!-- Пятый ряд: ноль, точка, равно -->
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equals" id="equalsBtn">=</button>
        </div>
    </div>

    <script>
        // --- ЗВУК КЛИКА (Web Audio API) ---
        let audioCtx = null;
        
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                // Разрешаем контекст (браузеры требуют взаимодействия пользователя)
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                console.log("Web Audio не поддерживается");
            }
        }

        function playClick() {
            if (!audioCtx) {
                initAudio();
                return;
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.value = 800; // Тонкий писк как у кнопки
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); // Громкость
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- ЛОГИКА КАЛЬКУЛЯТОРА (оптимизированная) ---
        let display = document.getElementById('display');
        let currentInput = '';
        let operator = null;
        let previousInput = '';
        let shouldResetDisplay = false;

        function updateDisplay(value) { 
            display.value = value; 
        }

        function appendNumber(number) {
            playClick();
            if (shouldResetDisplay) { 
                currentInput = ''; 
                shouldResetDisplay = false; 
            }
            if (number === '.' && currentInput.includes('.')) return;
            currentInput += number;
            updateDisplay(currentInput);
        }

        function appendOperator(op) {
            playClick();
            if (currentInput === '' && previousInput === '') return;
            if (previousInput !== '' && currentInput !== '' && operator) calculate();
            operator = op;
            previousInput = currentInput === '' ? previousInput : currentInput;
            currentInput = '';
            shouldResetDisplay = false;
        }

        function calculate() {
            playClick();
            if (previousInput === '' || currentInput === '' || operator === null) return;
            
            let prev = parseFloat(previousInput);
            let curr = parseFloat(currentInput);
            let result;
            
            switch(operator) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/': 
                    if (curr === 0) { 
                        alert('ДЕЛЕНИЕ НА НОЛЬ НЕВОЗМОЖНО'); 
                        clearDisplay(); 
                        return; 
                    }
                    result = prev / curr; 
                    break;
                case '%': result = prev % curr; break;
                default: return;
            }
            
            result = Math.round(result * 1000000) / 1000000;
            currentInput = result.toString();
            operator = null;
            previousInput = '';
            shouldResetDisplay = true;
            updateDisplay(currentInput);
        }

        function clearDisplay() {
            playClick();
            currentInput = '';
            previousInput = '';
            operator = null;
            shouldResetDisplay = false;
            updateDisplay('0');
        }

        // НОВАЯ ФУНКЦИЯ: Стереть последний символ
        function backspace() {
            playClick();
            if (shouldResetDisplay) return;
            currentInput = currentInput.slice(0, -1);
            if (currentInput === '' || currentInput === '-') {
                updateDisplay('0');
            } else {
                updateDisplay(currentInput);
            }
        }

        // --- ОБРАБОТЧИКИ СОБЫТИЙ ДЛЯ КНОПОК (чтобы звук был гарантирован) ---
        document.getElementById('clearBtn').addEventListener('click', clearDisplay);
        document.getElementById('backspaceBtn').addEventListener('click', backspace);
        document.getElementById('equalsBtn').addEventListener('click', calculate);

        // Глобальные функции для onclick в HTML (дублируем, но так как мы используем addEventListener, они тоже нужны)
        window.appendNumber = appendNumber;
        window.appendOperator = appendOperator;
        window.calculate = calculate;
        window.clearDisplay = clearDisplay;

        // Обработка клавиатуры
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/' || e.key === '%') appendOperator(e.key);
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearDisplay();
            if (e.key === 'Backspace') {
                e.preventDefault(); // Чтобы браузер не уходил назад
                backspace();
            }
        });

        // Запуск аудио-контекста при первом клике в любом месте (обход ограничений браузера)
        document.body.addEventListener('click', initAudio, { once: true });

        // --- СМЕНА ТЕМЫ (КИСЛОТНЫЙ ФИОЛЕТОВЫЙ РЕЖИМ) ---
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            playClick();
            document.body.classList.toggle('purple-mode');
            if (document.body.classList.contains('purple-mode')) {
                themeToggle.innerHTML = '☀️ ДЕНЬ';
            } else {
                themeToggle.innerHTML = '🌙 НОЧЬ';
            }
        });

        // --- PWA: Регистрация Service Worker (если еще не зарегистрирован) ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW зарегистрирован!', reg.scope))
                    .catch(err => console.log('Ошибка SW:', err));
            });
        }
    </script>
</body>
</html>
